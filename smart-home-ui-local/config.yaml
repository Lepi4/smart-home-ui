name: ALLHA-2D
slug: smart_home_ui_local
version: "4.1.12"
description: ALLHA-2D — local 2D floor-plan Smart Home UI for Home Assistant
url: https://github.com/Lepi4/smart-home-ui
image: ghcr.io/lepi4/smart-home-ui-{arch}
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8080
panel_icon: mdi:floor-plan
panel_title: ALLHA-2D
homeassistant_api: true
host_network: false
ports:
  8080/tcp: 8099
  32457/tcp: 32457
ports_description:
  8080/tcp: "ALLHA-2D LAN browser access. Do NOT forward this port on the router."
  32457/tcp: "ALLHA-2D protected mobile app port. Forward external 32457 to this port, or use HTTPS reverse proxy later."
options:
  pollIntervalMs: 6000
  dashboardPaths: []
schema:
  pollIntervalMs: int(2000,60000)
  dashboardPaths:
    - str
